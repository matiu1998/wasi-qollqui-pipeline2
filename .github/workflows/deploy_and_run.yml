name: Deploy to GCP (GCS jobs + Composer DAG)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: project-53930c9b-4e21-4329-b74
      REGION: us-central1
      BUCKET: wasi-qollqui-datalake-2
      COMPOSER_ENV: composer-wasi-qollqui
      DAG_ID: wasi_qollqui_medallion_pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Auth via Workload Identity Federation
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # 1) Subir el PySpark script a GCS (jobs/)
      - name: Upload PySpark job to GCS
        run: |
          gsutil -m cp -r src/pipeline_wasi_qollqui.py gs://${BUCKET}/jobs/pipeline_wasi_qollqui.py

      # 2) Subir el DAG a Composer (bucket de DAGs)
      - name: Upload DAG to Composer
        run: |
          DAG_BUCKET=$(gcloud composer environments describe ${COMPOSER_ENV} \
            --location ${REGION} \
            --format="value(config.dagGcsPrefix)")
          gsutil -m cp -r dags/${DAG_ID}.py ${DAG_BUCKET}/

      # 3) ✅ Trigger del DAG
      - name: Trigger Composer DAG
        run: |
          gcloud composer environments run ${COMPOSER_ENV} \
            --location ${REGION} \
            dags trigger -- ${DAG_ID}