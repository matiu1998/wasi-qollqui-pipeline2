name: Deploy to GCP (GCS jobs + Composer DAG)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_ID: project-53930c9b-4e21-4329-b74
  REGION: us-central1

  # Bucket del datalake (donde subimos el job pyspark)
  DATALAKE_BUCKET: wasi-qollqui-datalake-2

  # Bucket de Composer (DAGs)
  COMPOSER_DAGS_PREFIX: gs://us-central1-composer-wasi-q-4f939bbf-bucket/dags

  # Rutas en el repo
  PYSPARK_SCRIPT_LOCAL: src/pipeline_wasi_qollqui.py
  DAG_LOCAL: dags/wasi_qollqui_medallion_pipeline.py

  # Rutas destino en GCS
  PYSPARK_SCRIPT_GCS: gs://wasi-qollqui-datalake-2/jobs/pipeline_wasi_qollqui.py

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AUTH: OIDC -> Workload Identity Federation
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: gcloud set project
        run: gcloud config set project "${PROJECT_ID}"

      # Subir el PySpark job a tu bucket /jobs/
      - name: Upload PySpark script to GCS
        run: |
          gsutil cp "${PYSPARK_SCRIPT_LOCAL}" "${PYSPARK_SCRIPT_GCS}"
          gsutil ls -l "${PYSPARK_SCRIPT_GCS}"

      # Subir/actualizar DAG al bucket de Composer
      - name: Upload DAG to Composer
        run: |
          gsutil cp "${DAG_LOCAL}" "${COMPOSER_DAGS_PREFIX}/"
          gsutil ls -l "${COMPOSER_DAGS_PREFIX}/"